<!DOCTYPE html>
<html>
<head>
<title>Leeds Furniture Expert</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<header>
Leeds Furniture Expert
</header>

<div class="gallery" id="gallery"></div>

<script>

const cloudName = "du0waqevo"

fetch(`https://res.cloudinary.com/${cloudName}/image/list/home.json`)
.then(res => res.json())
.then(data => {

const gallery = document.getElementById("gallery")

data.resources.forEach(img => {

const image = document.createElement("img")

image.src = `https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.jpg`

gallery.appendChild(image)

})

})

</script>

</body>
</html>
